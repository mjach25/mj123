<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3rbgame — Admin Panel</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#07070f; --bg2:#0f0f1a; --card:#161625; --primary:#8b5cf6; --cyan:#06b6d4; --red:#ef4444; --border:rgba(255,255,255,.08); --muted:#8a8a9a; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:var(--bg); color:#fff; }
        
        /* LOGIN OVERLAY */
        #login-overlay { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:9999; }
        .login-box { background:var(--bg2); padding:40px; border-radius:20px; border:1px solid var(--border); width:350px; text-align:center; box-shadow:0 20px 40px rgba(0,0,0,.5); }
        .login-box h2 { font-family:'Orbitron',sans-serif; margin-bottom:20px; color:var(--primary); }
        .login-box input { width:100%; padding:12px; margin-bottom:15px; background:rgba(255,255,255,.05); border:1px solid var(--border); border-radius:8px; color:#fff; }
        .login-box button { width:100%; padding:12px; background:var(--primary); border:none; border-radius:8px; color:#fff; font-weight:bold; cursor:pointer; }
        
        /* ADMIN LAYOUT */
        .admin-layout { display:flex; height:100vh; }
        .sidebar { width:250px; background:var(--bg2); border-right:1px solid var(--border); padding:20px; }
        .logo { font-family:'Orbitron',sans-serif; font-size:20px; display:flex; align-items:center; gap:10px; margin-bottom:40px; }
        .logo i { color:var(--cyan); }
        .nav-item { padding:12px; margin-bottom:10px; border-radius:8px; cursor:pointer; transition:.3s; display:flex; align-items:center; gap:10px; color:var(--muted); }
        .nav-item.active, .nav-item:hover { background:var(--primary); color:#fff; }
        
        .content { flex:1; padding:40px; overflow-y:auto; }
        h1 { margin-bottom:20px; font-weight:800; }
        
        /* FORM */
        .form-card { background:var(--card); padding:30px; border-radius:16px; border:1px solid var(--border); margin-bottom:40px; }
        .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
        .form-group { display:flex; flex-direction:column; gap:8px; }
        .form-group.full { grid-column:1 / -1; }
        label { font-size:12px; color:var(--muted); font-weight:600; text-transform:uppercase; }
        input, select, textarea { padding:12px; background:rgba(255,255,255,.05); border:1px solid var(--border); border-radius:8px; color:#fff; font-family:'Inter',sans-serif; }
        textarea { resize:vertical; min-height:80px; }
        .btn { padding:12px 24px; background:var(--primary); border:none; border-radius:8px; color:#fff; font-weight:bold; cursor:pointer; }
        .btn:hover { opacity:.9; }
        
        .checkbox-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(120px, 1fr)); gap:10px; margin-top:5px; }
        .cb-label { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--muted); cursor:pointer; text-transform:none; font-weight:500; }
        .cb-label input { width:16px; height:16px; accent-color:var(--primary); cursor:pointer; margin:0; padding:0; }
        
        /* TABLE */
        .table-wrap { background:var(--card); border-radius:16px; border:1px solid var(--border); overflow:hidden; }
        table { width:100%; border-collapse:collapse; }
        th, td { padding:15px; text-align:left; border-bottom:1px solid var(--border); font-size:14px; }
        th { background:rgba(255,255,255,.02); color:var(--muted); font-weight:600; }
        tr:hover { background:rgba(255,255,255,.02); }
        .game-img { width:40px; height:40px; object-fit:cover; border-radius:8px; }
        .del-btn { background:rgba(239,68,68,.1); color:var(--red); border:none; padding:6px 12px; border-radius:6px; cursor:pointer; }
        .del-btn:hover { background:var(--red); color:#fff; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2><i class="fas fa-lock"></i> ADMIN PANEL</h2>
        <input type="password" id="admin-pass" placeholder="Enter Password">
        <button onclick="checkPass()">Login</button>
    </div>
</div>

<div class="admin-layout" style="display:none;" id="admin-main">
    <div class="sidebar">
        <div class="logo"><i class="fas fa-gamepad"></i> 3rbgame Admin</div>
        <div class="nav-item active" id="nav-games" onclick="switchTab('games')"><i class="fas fa-boxes"></i> Manage Games</div>
        <div class="nav-item" id="nav-settings" onclick="switchTab('settings')"><i class="fas fa-cog"></i> Edit Site Web</div>
        <div class="nav-item" id="nav-ads" onclick="switchTab('ads')"><i class="fas fa-ad"></i> Advertisements</div>
        <div class="nav-item" onclick="window.open('/', '_blank')"><i class="fas fa-external-link-alt"></i> View Site</div>
    </div>
    <div class="content">
        <!-- GAMES TAB -->
        <div id="tab-games" style="display: block;">
        <h1 id="form-title">Add New Game</h1>
        <div class="form-card">
            <form id="add-form" onsubmit="addGame(event)">
                <div class="form-grid">
                    <div class="form-group full">
                        <label>Game Title</label>
                        <input type="text" id="g-title" placeholder="e.g. Apex Legends" required dir="auto">
                    </div>
                    <div class="form-group">
                        <label>Platform</label>
                        <select id="g-plat">
                            <option value="steam">Steam</option>
                            <option value="epic">Epic Games</option>
                            <option value="demo">Free PC (Demo)</option>
                        </select>
                    </div>
                    <div class="form-group full">
                        <label>Genres</label>
                        <div class="checkbox-grid" id="g-genre-grid">
                            <label class="cb-label"><input type="checkbox" value="Action"> Action</label>
                            <label class="cb-label"><input type="checkbox" value="RPG"> RPG</label>
                            <label class="cb-label"><input type="checkbox" value="Battle Royale"> Battle Royale</label>
                            <label class="cb-label"><input type="checkbox" value="MOBA"> MOBA</label>
                            <label class="cb-label"><input type="checkbox" value="Shooting"> Shooting</label>
                            <label class="cb-label"><input type="checkbox" value="Sports"> Sports</label>
                            <label class="cb-label"><input type="checkbox" value="Racing"> Racing</label>
                            <label class="cb-label"><input type="checkbox" value="Casual"> Casual</label>
                            <label class="cb-label"><input type="checkbox" value="Fighting"> Fighting</label>
                            <label class="cb-label"><input type="checkbox" value="Sci-Fi"> Sci-Fi</label>
                            <label class="cb-label"><input type="checkbox" value="MMORPG"> MMORPG</label>
                            <label class="cb-label"><input type="checkbox" value="Strategy"> Strategy</label>
                            <label class="cb-label"><input type="checkbox" value="Simulation"> Simulation</label>
                            <label class="cb-label"><input type="checkbox" value="Online"> Online</label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Release Year</label>
                        <input type="number" id="g-year" value="2024">
                    </div>
                    <div class="form-group">
                        <label>Rating (e.g. 4.5)</label>
                        <input type="number" step="0.1" id="g-rating" value="4.0">
                    </div>
                    <div class="form-group">
                        <label>Downloads (e.g. 1.2M)</label>
                        <input type="text" id="g-dl" value="0.1M">
                    </div>
                    <div class="form-group full">
                        <label>Image URL (Thumbnail)</label>
                        <input type="text" id="g-img" placeholder="https://..." dir="auto">
                    </div>
                    <div class="form-group full">
                        <label>Hero Image URL 1 (Main Background)</label>
                        <input type="text" id="g-hero" placeholder="https://..." dir="auto" required>
                    </div>
                    <div class="form-group full">
                        <label>Hero Image URL 2 (Optional - for gallery)</label>
                        <input type="text" id="g-hero2" placeholder="https://..." dir="auto">
                    </div>
                    <div class="form-group full">
                        <label>Hero Image URL 3 (Optional - for gallery)</label>
                        <input type="text" id="g-hero3" placeholder="https://..." dir="auto">
                    </div>
                    <div class="form-group full">
                        <label>Play / Download Link</label>
                        <input type="text" id="g-link" placeholder="https://..." dir="auto">
                    </div>
                    <div class="form-group full">
                        <label>Description</label>
                        <textarea id="g-desc" rows="4" placeholder="Brief description..." dir="auto"></textarea>
                    </div>
                    <!-- Req System -->
                    <div class="form-group full"><h3 style="margin-top:10px; border-bottom:1px solid var(--border); padding-bottom:5px;">System Requirements (Optional)</h3></div>
                    <div class="form-grid" style="margin-top:20px;">
                    <div class="form-group"><label>OS</label><input type="text" id="r-os" placeholder="Windows 10" dir="auto"></div>
                    <div class="form-group"><label>Processor</label><input type="text" id="r-cpu" placeholder="Core i5" dir="auto"></div>
                    <div class="form-group"><label>Memory</label><input type="text" id="r-ram" placeholder="8 GB" dir="auto"></div>
                    <div class="form-group"><label>GPU</label><input type="text" id="r-gpu" placeholder="GTX 1060" dir="auto"></div>
                    <div class="form-group"><label>Storage</label><input type="text" id="r-str" placeholder="50 GB" dir="auto"></div>
                </div>
                <button type="submit" id="submit-btn" class="btn"><i class="fas fa-plus"></i> Add Game</button>
                <button type="button" id="cancel-btn" class="btn" style="display:none; background:var(--muted); margin-left:10px;" onclick="cancelEdit()"><i class="fas fa-times"></i> Cancel</button>
            </form>
        </div>

        <h1>Games Database</h1>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Image</th>
                        <th>Title</th>
                        <th>Platform</th>
                        <th>Year</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="games-table">
                    <!-- Loaded via JS -->
                </tbody>
            </table>
        </div>
        </div>
        
        <!-- SETTINGS TAB -->
        <div id="tab-settings" style="display: none;">
            <h1>Edit Site Web</h1>
            <div class="form-card">
                <form id="settings-form" onsubmit="saveSettings(event)">
                    <div class="form-grid">
                        <div class="form-group full">
                            <label>Hero Title (Line 1)</label>
                            <input type="text" id="s-hero1" required>
                        </div>
                        <div class="form-group full">
                            <label>Hero Title (Line 2 - Highlighted)</label>
                            <input type="text" id="s-hero2" required>
                        </div>
                        <div class="form-group full">
                            <label>Hero Title (Line 3)</label>
                            <input type="text" id="s-hero3" required>
                        </div>
                        <div class="form-group full">
                            <label>Hero Subtitle</label>
                            <input type="text" id="s-herosub" required>
                        </div>
                        <div class="form-group full">
                            <label>About Us Text</label>
                            <textarea id="s-about" required></textarea>
                        </div>
                    </div>
                    <button type="submit" class="btn"><i class="fas fa-save"></i> Save Settings</button>
                </form>
            </div>
        </div>

        <!-- ADS TAB -->
        <div id="tab-ads" style="display: none;">
            <h1>Manage Advertisements</h1>
            <div class="form-card">
                <form id="ads-form" onsubmit="saveAds(event)">
                    <div class="form-grid">
                        <div class="form-group full" style="flex-direction:row; align-items:center;">
                            <input type="checkbox" id="a-enabled" style="width:20px; height:20px;">
                            <label for="a-enabled" style="font-size:16px;">Enable Right Advertisement (Below Sign In)</label>
                        </div>
                        <div class="form-group full">
                            <label>Advertisement Image URL</label>
                            <input type="text" id="a-img" placeholder="e.g. https://placehold.co/300x600/..." required>
                        </div>
                        <div class="form-group full">
                            <label>Advertisement Link (Click Destination)</label>
                            <input type="text" id="a-link" placeholder="e.g. https://your-ad-link.com" required>
                        </div>
                    </div>
                    <button type="submit" class="btn"><i class="fas fa-save"></i> Save Advertisements</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
if (window.location.protocol === 'file:') {
    alert("تنبيه: راك فتحتي الملف مباشرة! لوحة التحكم ماغاديش تخدم ليك هاكا. عافاك سير خدم الملف لي سميتو start.bat باش يخدم السيرفر.");
}

function checkPass() {
    if(document.getElementById('admin-pass').value === 'admin123') {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('admin-main').style.display = 'flex';
        // Load data async - won't block login
        Promise.allSettled([loadGames(), loadSettings(), loadAds()]);
    } else {
        alert('Wrong Password!');
    }
}

let allGames = [];
let editingId = null;

async function loadGames() {
    const res = await fetch('/api/games');
    allGames = await res.json();
    const tbody = document.getElementById('games-table');
    tbody.innerHTML = allGames.map(g => `
        <tr>
            <td>${g.id}</td>
            <td><img src="${g.img}" class="game-img"></td>
            <td><strong>${g.title}</strong></td>
            <td style="text-transform:uppercase;">${g.platform}</td>
            <td>${g.year}</td>
            <td>
                <button class="edit-btn" onclick="startEdit(${g.id})" style="background:rgba(6,182,212,.1); color:var(--cyan); border:none; padding:6px 12px; border-radius:6px; cursor:pointer; margin-right:5px;"><i class="fas fa-edit"></i> Edit</button>
                <button class="del-btn" onclick="deleteGame(${g.id})"><i class="fas fa-trash"></i> Delete</button>
            </td>
        </tr>
    `).join('');
}

function startEdit(id) {
    const g = allGames.find(x => x.id === id);
    if(!g) return;
    editingId = id;
    document.getElementById('form-title').textContent = "Edit Game: " + g.title;
    document.getElementById('submit-btn').innerHTML = '<i class="fas fa-save"></i> Save Changes';
    document.getElementById('cancel-btn').style.display = 'inline-block';
    
    document.getElementById('g-title').value = g.title;
    document.getElementById('g-plat').value = g.platform;
    
    const genreArray = Array.isArray(g.genre) ? g.genre : (g.genre || '').split(',').map(x=>x.trim());
    document.querySelectorAll('#g-genre-grid input').forEach(cb => {
        cb.checked = genreArray.includes(cb.value);
    });

    document.getElementById('g-year').value = g.year;
    document.getElementById('g-rating').value = g.rating;
    document.getElementById('g-dl').value = g.dl;
    document.getElementById('g-img').value = g.img || "";
    document.getElementById('g-hero').value = g.hero || "";
    document.getElementById('g-hero2').value = g.hero2 || "";
    document.getElementById('g-hero3').value = g.hero3 || "";
    document.getElementById('g-link').value = g.link || "";
    document.getElementById('g-desc').value = g.desc;
    if(g.req) {
        document.getElementById('r-os').value = g.req.os || "";
        document.getElementById('r-cpu').value = g.req.cpu || "";
        document.getElementById('r-ram').value = g.req.ram || "";
        document.getElementById('r-gpu').value = g.req.gpu || "";
        document.getElementById('r-str').value = g.req.str || "";
    }
    window.scrollTo({top:0, behavior:'smooth'});
}

function cancelEdit() {
    editingId = null;
    document.getElementById('add-form').reset();
    document.getElementById('form-title').textContent = "Add New Game";
    document.getElementById('submit-btn').innerHTML = '<i class="fas fa-plus"></i> Add Game';
    document.getElementById('cancel-btn').style.display = 'none';
}

async function addGame(e) {
    e.preventDefault();
    const newGame = {
        title: document.getElementById('g-title').value,
        platform: document.getElementById('g-plat').value,
        genre: Array.from(document.querySelectorAll('#g-genre-grid input:checked')).map(cb => cb.value),
        year: parseInt(document.getElementById('g-year').value),
        rating: parseFloat(document.getElementById('g-rating').value),
        dl: document.getElementById('g-dl').value,
        img: document.getElementById('g-img').value,
        hero: document.getElementById('g-hero').value,
        hero2: document.getElementById('g-hero2').value,
        hero3: document.getElementById('g-hero3').value,
        link: document.getElementById('g-link').value,
        desc: document.getElementById('g-desc').value,
        hot: true, isNew: true,
        req: {
            os: document.getElementById('r-os').value || "Windows 10",
            cpu: document.getElementById('r-cpu').value || "Core i5",
            ram: document.getElementById('r-ram').value || "8 GB",
            gpu: document.getElementById('r-gpu').value || "GTX 1060",
            str: document.getElementById('r-str').value || "50 GB",
        }
    };

    const url = editingId ? '/api/games/' + editingId : '/api/games';
    const method = editingId ? 'PUT' : 'POST';

    await fetch(url, {
        method: method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(newGame)
    });

    const isEdit = !!editingId;
    cancelEdit();
    loadGames();
    alert(isEdit ? "Game Updated Successfully!" : "Game Added Successfully!");
}

async function deleteGame(id) {
    if(!confirm("Are you sure you want to delete this game?")) return;
    await fetch('/api/games/'+id, { method: 'DELETE' });
    loadGames();
}

function switchTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    
    document.getElementById('tab-' + tabId).style.display = 'block';
    document.getElementById('nav-' + tabId).classList.add('active');
}

async function loadSettings() {
    const res = await fetch('/api/settings');
    const settings = await res.json();
    if(settings) {
        document.getElementById('s-hero1').value = settings.heroLine1 || "";
        document.getElementById('s-hero2').value = settings.heroLine2 || "";
        document.getElementById('s-hero3').value = settings.heroLine3 || "";
        document.getElementById('s-herosub').value = settings.heroSub || "";
        document.getElementById('s-about').value = settings.aboutText || "";
    }
}

async function saveSettings(e) {
    e.preventDefault();
    const settings = {
        heroLine1: document.getElementById('s-hero1').value,
        heroLine2: document.getElementById('s-hero2').value,
        heroLine3: document.getElementById('s-hero3').value,
        heroSub: document.getElementById('s-herosub').value,
        aboutText: document.getElementById('s-about').value
    };
    await fetch('/api/settings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(settings)
    });
    alert("Site Settings saved successfully!");
}

async function loadAds() {
    const res = await fetch('/api/ads');
    const ads = await res.json();
    if(ads) {
        document.getElementById('a-enabled').checked = ads.rightAdEnabled || false;
        document.getElementById('a-img').value = ads.rightAdImage || "";
        document.getElementById('a-link').value = ads.rightAdLink || "";
    }
}

async function saveAds(e) {
    e.preventDefault();
    const ads = {
        rightAdEnabled: document.getElementById('a-enabled').checked,
        rightAdImage: document.getElementById('a-img').value,
        rightAdLink: document.getElementById('a-link').value
    };
    await fetch('/api/ads', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(ads)
    });
    alert("Advertisements saved successfully!");
}
</script>
</body>
</html>
